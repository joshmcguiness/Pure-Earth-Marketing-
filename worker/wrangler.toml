name = "marketing-tool-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

[vars]
ALLOWED_ORIGIN = "https://joshmcguiness.github.io"

# KV namespace for user accounts and sessions
# Create with: wrangler kv:namespace create "AUTH"
# Then paste the id below
[[kv_namespaces]]
binding = "AUTH"
id = "PASTE_YOUR_KV_NAMESPACE_ID_HERE"

# Secrets (set via CLI — never stored in this file):
# wrangler secret put ANTHROPIC_API_KEY
# wrangler secret put INVITE_CODE
